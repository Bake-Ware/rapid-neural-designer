<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapid Neural Designer</title>

    <!-- Socket.IO for real-time collaboration (must load before Monaco's AMD loader) -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

    <!-- Three.js r150 (global build + transmission + examples/js addons) -->
    <!-- Must load before ANY AMD loader (LiteGraph or Monaco) to avoid define() hijack -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.140.0/build/three.min.js"></script>
    <!-- Temporarily hide define() so addons register on THREE global -->
    <script>window.__savedDefine = window.define; window.define = undefined;</script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.140.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.140.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.140.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.140.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.140.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.140.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.140.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script>
        window.define = window.__savedDefine; delete window.__savedDefine;
        window.THREE_OrbitControls = THREE.OrbitControls;
        window.THREE_EffectComposer = THREE.EffectComposer;
        window.THREE_RenderPass = THREE.RenderPass;
        window.THREE_UnrealBloomPass = THREE.UnrealBloomPass;
    </script>

    <!-- LiteGraph.js for node-based visual programming -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/litegraph.js@0.7.18/css/litegraph.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/litegraph.js@0.7.18/build/litegraph.min.js"></script>

    <!-- Monaco Editor for code display -->
    <link rel="stylesheet" data-name="vs/editor/editor.main" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/editor/editor.main.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e1e;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
        }

        #header {
            background: #2d2d30;
            border-bottom: 1px solid #3e3e42;
            display: flex;
            align-items: center;
            z-index: 1000;
            height: 38px;
            padding: 0 12px;
            gap: 4px;
        }

        #header h1 { font-size: 14px; color: #007acc; margin-right: 8px; white-space: nowrap; }

        .toolbar-sep {
            width: 1px;
            height: 20px;
            background: #3e3e42;
            margin: 0 6px;
        }

        .tab {
            background: transparent;
            border: none;
            color: #999;
            padding: 4px 12px;
            cursor: pointer;
            font-size: 12px;
            border-bottom: 2px solid transparent;
            transition: all 0.15s;
        }

        .tab:hover { color: #ffffff; background: rgba(255,255,255,0.05); }
        .tab.active { color: #007acc; border-bottom-color: #007acc; }

        .toolbar-spacer { flex: 1; }

        button {
            background: transparent;
            border: none;
            color: #ccc;
            padding: 4px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.15s;
        }

        button:hover { background: rgba(255,255,255,0.1); color: #fff; }
        button:active { background: rgba(255,255,255,0.15); }

        #container {
            height: calc(100vh - 38px);
            position: relative;
            display: flex;
        }

        .tab-content { display: none; height: 100%; width: 100%; }
        .tab-content.active { display: flex; }

        /* === Node Palette === */
        #node-palette {
            width: 260px;
            background: #252526;
            border-right: 1px solid #3e3e42;
            overflow-y: auto;
            flex-shrink: 0;
            margin-bottom: 22px;
        }

        .palette-category { border-bottom: 1px solid #3e3e42; }

        .palette-category-header {
            background: #2d2d30;
            padding: 10px 14px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            transition: background 0.2s;
        }

        .palette-category-header:hover { background: #3e3e42; }
        .palette-category-content { padding: 6px 8px; display: none; }
        .palette-category.expanded .palette-category-content { display: block; }
        .palette-category.expanded .palette-arrow { transform: rotate(90deg); }

        .palette-arrow {
            font-size: 10px;
            transition: transform 0.2s;
            color: #888;
        }

        .palette-node {
            background: #3e3e42;
            padding: 7px 10px;
            margin: 3px 0;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.15s;
            border-left: 3px solid transparent;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .palette-node:hover {
            background: #4e4e52;
            transform: translateX(2px);
        }

        .palette-node-desc {
            font-size: 10px;
            color: #888;
            margin-top: 2px;
        }

        .palette-node-tag {
            display: inline-block;
            font-size: 9px;
            padding: 1px 5px;
            border-radius: 3px;
            background: rgba(255,255,255,0.08);
            color: #999;
            margin-left: 6px;
            vertical-align: middle;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }


        .palette-section-header {
            background: #1e3a5f;
            padding: 8px 14px;
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6bb5ff;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }

        .palette-section-header:hover { background: #254a6f; }

        .palette-section-header .section-arrow {
            font-size: 10px;
            transition: transform 0.2s;
        }

        .palette-section.collapsed .palette-section-content { display: none; }
        .palette-section.collapsed .section-arrow { transform: rotate(-90deg); }

        /* === Graph Canvas === */
        #graph-canvas-wrapper { flex: 1; position: relative; }
        #graph-canvas { width: 100%; height: 100%; }

        /* === Code Tab === */
        #code-container {
            width: 100%;
            height: 100%;
            background: #1e1e1e;
            display: flex;
            flex-direction: column;
        }

        #code-header {
            background: #2d2d30;
            padding: 8px 20px;
            border-bottom: 1px solid #3e3e42;
            font-weight: 600;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #code-actions { display: flex; gap: 8px; }

        .run-button { background: #0e7a0d; color: white; }
        .run-button:hover { background: #0c6b0b; color: white; }
        .run-button:disabled { background: #555; color: #999; cursor: not-allowed; }
        .running { background: #cca700 !important; }

        #code-output { flex: 1; overflow: hidden; position: relative; }
        #monaco-editor { width: 100%; height: 100%; }

        #execution-output {
            background: #1e1e1e;
            border-top: 2px solid #007acc;
            max-height: 50vh;
            overflow-y: auto;
            display: none;
        }

        #execution-output.visible { display: block; }

        #execution-header {
            background: #2d2d30;
            padding: 8px 20px;
            border-bottom: 1px solid #3e3e42;
            font-weight: 600;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #execution-content {
            padding: 12px 20px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 12px;
            line-height: 1.5;
        }

        .exec-stdout { color: #d4d4d4; white-space: pre-wrap; }
        .exec-stderr { color: #f48771; white-space: pre-wrap; }
        .exec-info { color: #4ec9b0; padding: 3px 0; }
        .exec-error { color: #f48771; padding: 3px 0; }

        /* === Status bar === */
        #status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #007acc;
            padding: 3px 20px;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            z-index: 1000;
        }

        /* Breadcrumb navigation for subgraph depth */
        #breadcrumb-bar {
            display: none;
            background: #252526;
            border-bottom: 1px solid #3e3e42;
        }

        #breadcrumb-bar.visible {
            display: flex;
            flex-direction: column;
        }

        .breadcrumb-level {
            padding: 6px 16px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.15s;
            border-left: 3px solid transparent;
        }

        .breadcrumb-level:hover {
            background: #3e3e42;
        }

        .breadcrumb-level .crumb-color {
            width: 8px;
            height: 8px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .breadcrumb-level.current {
            color: #ffffff;
            background: #2d2d30;
            border-left-color: #007acc;
            cursor: default;
        }

        .breadcrumb-level:not(.current) {
            color: #999;
        }

        /* === Room indicator === */
        #room-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #999;
        }
        #room-indicator .room-name {
            color: #4ec9b0;
            font-weight: 600;
            cursor: pointer;
            padding: 2px 8px;
            border-radius: 3px;
            background: rgba(78, 201, 176, 0.1);
            border: 1px solid rgba(78, 201, 176, 0.2);
            transition: all 0.15s;
        }
        #room-indicator .room-name:hover {
            background: rgba(78, 201, 176, 0.2);
            border-color: rgba(78, 201, 176, 0.4);
        }
        #room-indicator .room-status {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #666;
        }
        #room-indicator .room-status.connected {
            background: #4ec9b0;
            box-shadow: 0 0 4px rgba(78, 201, 176, 0.5);
        }
        #room-join-dialog {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #2d2d30;
            border: 1px solid #3e3e42;
            border-radius: 6px;
            padding: 20px;
            z-index: 2000;
            min-width: 300px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        #room-join-dialog.visible { display: block; }
        #room-join-dialog h3 { margin-bottom: 12px; font-size: 14px; color: #007acc; }
        #room-join-dialog input {
            width: 100%;
            padding: 6px 10px;
            background: #1e1e1e;
            border: 1px solid #3e3e42;
            border-radius: 3px;
            color: #fff;
            font-size: 13px;
            margin-bottom: 12px;
        }
        #room-join-dialog .dialog-buttons {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }
        #room-join-dialog button {
            padding: 5px 14px;
            border-radius: 3px;
            font-size: 12px;
        }
        #room-join-dialog .btn-primary {
            background: #007acc;
            color: #fff;
        }
        #room-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 1999;
        }
        #room-overlay.visible { display: block; }

        /* Custom LiteGraph dark theme */
        .litegraph { background-color: #1e1e1e !important; }
        .litecontextmenu { background: #252526 !important; border: 1px solid #3e3e42 !important; }
        .litecontextmenu .litemenu-entry { color: #cccccc !important; }
        .litecontextmenu .litemenu-entry:hover { background: #007acc !important; color: white !important; }
        .litecontextmenu .litemenu-entry.disabled { color: #666 !important; pointer-events: none; }
    </style>
</head>
<body>
    <div id="header">
        <h1>RND</h1>
        <button class="tab active" onclick="switchTab('graph')">Designer</button>
        <button class="tab" onclick="switchTab('code')">Code</button>
        <button class="tab" onclick="switchTab('3d')">3D</button>
        <div class="toolbar-sep"></div>
        <button onclick="saveGraph()">Save</button>
        <button onclick="loadGraph()">Load</button>
        <button onclick="clearGraph()">Clear</button>
        <div class="toolbar-sep"></div>
        <button onclick="toggleCollapseAll()">Collapse All</button>
        <div class="toolbar-spacer"></div>
        <div id="room-indicator">
            <div class="room-status" id="room-status-dot"></div>
            <span id="room-label">No room</span>
            <span class="room-name" id="room-name-btn" onclick="showRoomDialog()" title="Click to create or join a room">Connect</span>
        </div>
        <div class="toolbar-sep"></div>
        <button onclick="copyCode()">Copy Code</button>
        <button onclick="downloadCode()">Download .py</button>
    </div>

    <!-- Room join/create dialog -->
    <div id="room-overlay" onclick="hideRoomDialog()"></div>
    <div id="room-join-dialog">
        <h3>Collaboration Room</h3>
        <input type="text" id="room-join-input" placeholder="Type a room name or leave blank for random" onkeydown="if(event.key==='Enter')createOrJoinRoom()">
        <div class="dialog-buttons">
            <button onclick="hideRoomDialog()">Cancel</button>
            <button class="btn-primary" onclick="createOrJoinRoom()">Go</button>
        </div>
    </div>

    <div id="container">
        <!-- Graph Designer Tab -->
        <div id="graph-tab" class="tab-content active">
            <div style="display:flex;width:100%;height:100%;">
                <div id="node-palette">
                    <div class="palette-section">
                        <div class="palette-section-header" onclick="this.parentElement.classList.toggle('collapsed')">
                            <span>Models</span>
                            <span class="section-arrow">▼</span>
                        </div>
                        <div class="palette-section-content" id="model-palette">
                            <div style="padding:12px;color:#888;font-size:11px;">
                                No saved models found.
                            </div>
                        </div>
                    </div>
                    <div class="palette-section collapsed">
                        <div class="palette-section-header" onclick="this.parentElement.classList.toggle('collapsed')">
                            <span>Components</span>
                            <span class="section-arrow">▼</span>
                        </div>
                        <div class="palette-section-content" id="molecular-palette">
                            <div style="padding:12px;color:#888;font-size:11px;">
                                No components loaded.
                            </div>
                        </div>
                    </div>
                    <div class="palette-section collapsed">
                        <div class="palette-section-header" onclick="this.parentElement.classList.toggle('collapsed')">
                            <span>Primitives</span>
                            <span class="section-arrow">▼</span>
                        </div>
                        <div class="palette-section-content" id="atomic-palette"></div>
                    </div>
                </div>
                <div style="flex:1;display:flex;flex-direction:column;">
                    <div id="breadcrumb-bar"></div>
                    <div id="graph-canvas-wrapper" style="flex:1;position:relative;">
                        <canvas id="graph-canvas"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Code Tab -->
        <div id="code-tab" class="tab-content">
            <div id="code-container">
                <div id="code-header">
                    <span>Generated Python Code</span>
                    <div id="code-actions">
                        <button id="run-button" class="run-button" onclick="runCode()">Run Code</button>
                    </div>
                </div>
                <div id="code-output">
                    <div id="monaco-editor"></div>
                </div>
                <div id="execution-output">
                    <div id="execution-header">
                        <span>Execution Output</span>
                        <button onclick="clearExecutionOutput()" style="background:transparent;padding:2px 8px;">X</button>
                    </div>
                    <div id="execution-content"></div>
                </div>
            </div>
        </div>

        <!-- 3D Tab -->
        <div id="3d-tab" class="tab-content">
            <div style="width:100%;height:100%;position:relative;">
                <canvas id="canvas3d" style="width:100%;height:100%;display:block;"></canvas>
                <div id="three-hud" style="position:absolute;top:8px;left:12px;display:flex;align-items:center;gap:10px;z-index:10;">
                    <div id="three-breadcrumb" style="font-size:12px;color:#888;"></div>
                    <span style="flex:1"></span>
                </div>
                <div id="three-tooltip" style="position:absolute;display:none;background:rgba(30,30,35,0.95);backdrop-filter:blur(8px);border:1px solid rgba(0,122,204,0.4);border-radius:6px;padding:10px 14px;font-size:12px;color:#ccc;pointer-events:none;z-index:20;max-width:280px;">
                    <div class="tt3-title" style="color:#fff;font-weight:600;margin-bottom:4px;font-size:13px;"></div>
                    <div class="tt3-type" style="color:#007acc;font-size:11px;margin-bottom:6px;"></div>
                    <div class="tt3-prop" style="color:#888;font-size:11px;white-space:pre-line;"></div>
                    <div class="tt3-hint" style="color:#555;font-size:10px;margin-top:6px;border-top:1px solid rgba(255,255,255,0.05);padding-top:5px;"></div>
                </div>
                <div id="three-zoom-indicator" style="position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,122,204,0.15);border:1px solid rgba(0,122,204,0.3);border-radius:20px;padding:6px 16px;font-size:11px;color:#007acc;opacity:0;transition:opacity 0.3s;pointer-events:none;"></div>
                <div id="three-conn-mode" style="position:absolute;top:40px;left:50%;transform:translateX(-50%);background:rgba(255,152,0,0.2);border:1px solid rgba(255,152,0,0.5);border-radius:6px;padding:8px 18px;font-size:12px;color:#ffb74d;display:none;z-index:10;">
                    Connecting from: <span id="three-conn-source">?</span> — Click target node
                    <span onclick="t3_cancelConnection()" style="cursor:pointer;text-decoration:underline;margin-left:8px;color:#ff8a65;">Cancel</span>
                </div>
                <!-- 3D Property Panel -->
                <div id="t3-prop-panel" style="position:absolute;right:-320px;top:0;width:300px;height:100%;background:rgba(20,20,28,0.95);backdrop-filter:blur(12px);border-left:1px solid rgba(0,122,204,0.25);z-index:30;transition:right 0.3s cubic-bezier(0.4,0,0.2,1);overflow-y:auto;font-size:12px;">
                    <div style="padding:12px 14px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(20,20,28,0.98);z-index:1;">
                        <div>
                            <div id="t3-prop-title" style="font-size:14px;font-weight:600;color:#fff;"></div>
                            <div id="t3-prop-type" style="font-size:11px;color:#007acc;margin-top:2px;"></div>
                        </div>
                        <span onclick="t3_closePropPanel()" style="cursor:pointer;color:#666;font-size:18px;padding:2px 6px;">&times;</span>
                    </div>
                    <div id="t3-prop-body" style="padding:8px 14px 14px;"></div>
                </div>
                <!-- 3D Controls Panel -->
                <div id="t3-controls" style="position:absolute;bottom:12px;left:12px;background:rgba(20,20,28,0.85);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:10px 14px;z-index:15;font-size:11px;color:#888;min-width:200px;">
                    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
                        <input type="checkbox" id="t3c-grid" checked onchange="t3_toggleGrid(this.checked)" style="accent-color:#007acc;">
                        <label for="t3c-grid" style="cursor:pointer;">Grid</label>
                    </div>
                    <div style="margin-bottom:6px;">
                        <label style="display:flex;justify-content:space-between;">Spacing <span id="t3c-spacing-val">140</span></label>
                        <input type="range" id="t3c-spacing" min="60" max="300" value="140" step="10" oninput="t3_setSpacing(+this.value)" style="width:100%;accent-color:#007acc;">
                    </div>
                    <div style="margin-bottom:6px;">
                        <label style="display:flex;justify-content:space-between;">Refraction <span id="t3c-refract-val">0.95</span></label>
                        <input type="range" id="t3c-refract" min="0" max="100" value="95" step="1" oninput="t3_setRefraction(+this.value/100)" style="width:100%;accent-color:#007acc;">
                    </div>
                    <div>
                        <label style="display:flex;justify-content:space-between;">Bloom <span id="t3c-bloom-val">0.4</span></label>
                        <input type="range" id="t3c-bloom" min="0" max="200" value="40" step="5" oninput="t3_setBloom(+this.value/100)" style="width:100%;accent-color:#007acc;">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="status-bar">
        <span id="status-nodes">Nodes: 0</span>
        <span id="status-info">Loading...</span>
    </div>

    <script>
    // =========================================================================
    // Rapid Neural Designer - Graph Editor
    // Dynamically loads atomic components from JSON, compiles to Python
    // via handlebars-style template substitution
    // =========================================================================

    let monacoEditor = null;
    const atomicRegistry = {};   // id -> atomic definition
    const molecularRegistry = {}; // id -> molecular definition

    // ---- Monaco Editor Setup ----
    require.config({
        paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' }
    });

    require(['vs/editor/editor.main'], function() {
        monacoEditor = monaco.editor.create(document.getElementById('monaco-editor'), {
            value: '# Build a graph in the Designer tab to generate code',
            language: 'python',
            theme: 'vs-dark',
            automaticLayout: true,
            readOnly: false,
            minimap: { enabled: true },
            fontSize: 13,
            lineNumbers: 'on',
            scrollBeyondLastLine: false,
            renderWhitespace: 'selection'
        });
    });

    // ---- LiteGraph Setup ----
    LiteGraph.NODE_TITLE_HEIGHT = 26;
    LiteGraph.NODE_SLOT_HEIGHT = 20;
    LiteGraph.NODE_WIDTH = 200;

    // Slots on top/bottom edges instead of left/right
    LGraphNode.prototype.horizontal = true;
    LiteGraph.NODE_TITLE_COLOR = "#2d2d30";
    LiteGraph.NODE_DEFAULT_COLOR = "#3e3e42";
    LiteGraph.DEFAULT_BACKGROUND_COLOR = "#1e1e1e";
    LiteGraph.LINK_COLOR = "#5a9fd4";

    const graph = new LGraph();
    const canvasElement = document.getElementById("graph-canvas");
    const graphCanvas = new LGraphCanvas(canvasElement, graph);

    // Returns the currently viewed graph (root or inner subgraph)
    function activeGraph() { return graphCanvas.graph || graph; }

    graphCanvas.allow_searchbox = true;
    graphCanvas.allow_dragnodes = true;
    graphCanvas.allow_interaction = true;
    graphCanvas.render_shadows = false;
    // Grid background - create a small grid tile as a data URL
    (function() {
        const sz = 40;
        const c = document.createElement('canvas');
        c.width = sz; c.height = sz;
        const ctx = c.getContext('2d');
        ctx.fillStyle = '#1e1e1e';
        ctx.fillRect(0, 0, sz, sz);
        ctx.strokeStyle = 'rgba(255,255,255,0.04)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(sz, 0); ctx.lineTo(sz, sz);
        ctx.moveTo(0, sz); ctx.lineTo(sz, sz);
        ctx.stroke();
        graphCanvas.background_image = c.toDataURL();
    })();

    // Link rendering - thicker, more visible cables
    graphCanvas.connections_width = 3;
    graphCanvas.render_connections_border = true;
    graphCanvas.render_curved_connections = true;
    graphCanvas.render_connection_arrows = false;
    graphCanvas.default_connection_color = { input_off: "#5a9fd488", input_on: "#7ab8e8", output_off: "#5a9fd488", output_on: "#7ab8e8" };
    graphCanvas.highquality_render = true;

    // ---- Selection & Navigation ----
    // LiteGraph 0.7.18 interaction model:
    //   allow_dragcanvas=true: left-drag pans, scroll zooms, Ctrl+drag box selects
    //   Zoom is gated on allow_dragcanvas, so it MUST stay true.
    //
    // We add:
    //   - Click empty canvas = deselect all
    //   - Shift+drag on empty canvas = box select (without needing Ctrl)

    graphCanvas.multi_select = true;
    graphCanvas.allow_dragcanvas = true;

    // Runs AFTER LiteGraph's capture-phase handler.
    // 1. Left-click node without modifier → deselect others
    // 2. Left-click/drag empty canvas → deselect all + box select (cancel pan)
    // 3. Middle-drag → pan
    canvasElement.addEventListener('mousedown', function(e) {
        if (e.button !== 0) return;
        if (graphCanvas.connecting_node) return;

        const rect = canvasElement.getBoundingClientRect();
        const cx = (e.clientX - rect.left) / graphCanvas.ds.scale - graphCanvas.ds.offset[0];
        const cy = (e.clientY - rect.top) / graphCanvas.ds.scale - graphCanvas.ds.offset[1];
        // Check both node body AND title bar (getNodeOnPos misses the title)
        let nodeUnder = activeGraph().getNodeOnPos(cx, cy, activeGraph()._nodes);
        if (!nodeUnder) {
            const th = LiteGraph.NODE_TITLE_HEIGHT;
            for (const n of activeGraph()._nodes) {
                if (cx >= n.pos[0] && cx <= n.pos[0] + n.size[0] &&
                    cy >= n.pos[1] - th && cy < n.pos[1]) {
                    nodeUnder = n;
                    break;
                }
            }
        }

        if (nodeUnder) {
            // Clicked a node — if no modifier, deselect everything else
            if (!e.ctrlKey && !e.shiftKey) {
                for (const [id, n] of Object.entries(graphCanvas.selected_nodes)) {
                    if (n !== nodeUnder) {
                        n.is_selected = false;
                        delete graphCanvas.selected_nodes[id];
                    }
                }
                graphCanvas.setDirty(true, true);
            }
        } else {
            // Left-click/drag empty canvas → deselect + box select
            if (!e.shiftKey) {
                graphCanvas.deselectAllNodes();
            }
            // Cancel the pan that LiteGraph just started, replace with box select
            graphCanvas.dragging_canvas = false;
            graphCanvas.dragging_rectangle = new Float32Array(4);
            graphCanvas.dragging_rectangle[0] = cx;
            graphCanvas.dragging_rectangle[1] = cy;
            graphCanvas.dragging_rectangle[2] = 1;
            graphCanvas.dragging_rectangle[3] = 1;
            graphCanvas.setDirty(true, true);
        }
    });

    // Middle-mouse pan (since left-drag is now box select, not pan)
    let _pan = null;

    canvasElement.addEventListener('pointerdown', function(e) {
        if (e.button === 1) {
            e.preventDefault();
            _pan = { x: e.clientX, y: e.clientY, ox: graphCanvas.ds.offset[0], oy: graphCanvas.ds.offset[1] };
            canvasElement.setPointerCapture(e.pointerId);
        }
    });

    canvasElement.addEventListener('pointermove', function(e) {
        if (_pan && (e.buttons & 4)) {
            graphCanvas.ds.offset[0] = _pan.ox + (e.clientX - _pan.x) / graphCanvas.ds.scale;
            graphCanvas.ds.offset[1] = _pan.oy + (e.clientY - _pan.y) / graphCanvas.ds.scale;
            graphCanvas.setDirty(true, true);
        }
    });

    canvasElement.addEventListener('pointerup', function(e) {
        if (e.button === 1) _pan = null;
    });

    canvasElement.addEventListener('mousedown', function(e) {
        if (e.button === 1) e.preventDefault();
    });

    // ---- Breadcrumb Navigation ----

    function updateBreadcrumbs() {
        const bar = document.getElementById('breadcrumb-bar');
        const stack = graphCanvas._graph_stack || [];
        const currentGraph = graphCanvas.graph;

        if (stack.length === 0) {
            bar.classList.remove('visible');
            bar.innerHTML = '';
            return;
        }

        bar.classList.add('visible');
        bar.innerHTML = '';

        // Build the path: root → each stacked graph → current
        // stack[0] = root graph, stack[1] = first subgraph, etc.
        // currentGraph = the deepest level we're viewing

        // Root level
        const rootEl = document.createElement('div');
        rootEl.className = 'breadcrumb-level';
        rootEl.innerHTML = '<span class="crumb-color" style="background:#007acc"></span> Root';
        rootEl.addEventListener('click', () => {
            // Close all subgraphs to get back to root
            while (graphCanvas._graph_stack && graphCanvas._graph_stack.length > 0) {
                graphCanvas.closeSubgraph();
            }
            updateBreadcrumbs();
        });
        bar.appendChild(rootEl);

        // Each level in the stack represents a graph we navigated INTO
        // The _subgraph_node on each graph tells us which node we entered
        for (let i = 1; i < stack.length; i++) {
            const g = stack[i];
            const node = g._subgraph_node;
            const name = node ? (node.title || 'Subgraph') : `Level ${i}`;
            const color = node ? (node.color || '#6bb5ff') : '#6bb5ff';

            const el = document.createElement('div');
            el.className = 'breadcrumb-level';
            el.innerHTML = `<span class="crumb-color" style="background:${color}"></span> ${name}`;
            el.addEventListener('click', ((targetDepth) => () => {
                // Close subgraphs until we reach this depth
                while (graphCanvas._graph_stack && graphCanvas._graph_stack.length > targetDepth) {
                    graphCanvas.closeSubgraph();
                }
                updateBreadcrumbs();
            })(i));
            bar.appendChild(el);
        }

        // Current level (the one we're viewing)
        const curNode = currentGraph._subgraph_node;
        const curName = curNode ? (curNode.title || 'Subgraph') : 'Current';
        const curColor = curNode ? (curNode.color || '#6bb5ff') : '#6bb5ff';

        const curEl = document.createElement('div');
        curEl.className = 'breadcrumb-level current';
        curEl.innerHTML = `<span class="crumb-color" style="background:${curColor}"></span> ${curName}`;
        bar.appendChild(curEl);
    }

    // Hook into openSubgraph/closeSubgraph for breadcrumbs + zoom animation
    const ZOOM_DURATION = 250; // ms

    function animateDS(canvas, targetScale, targetOffsetX, targetOffsetY, duration, callback) {
        const startScale = canvas.ds.scale;
        const startOX = canvas.ds.offset[0];
        const startOY = canvas.ds.offset[1];
        const startTime = performance.now();

        function tick(now) {
            let t = Math.min(1, (now - startTime) / duration);
            // Ease in-out
            t = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

            canvas.ds.scale = startScale + (targetScale - startScale) * t;
            canvas.ds.offset[0] = startOX + (targetOffsetX - startOX) * t;
            canvas.ds.offset[1] = startOY + (targetOffsetY - startOY) * t;
            canvas.setDirty(true, true);

            if (t < 1) {
                requestAnimationFrame(tick);
            } else {
                if (callback) callback();
            }
        }
        requestAnimationFrame(tick);
    }

    const _origOpen = LGraphCanvas.prototype.openSubgraph;
    LGraphCanvas.prototype.openSubgraph = function(g) {
        const canvas = this;

        // Find the subgraph node we're entering
        const subNode = g._subgraph_node;
        if (!subNode) {
            _origOpen.call(this, g);
            updateBreadcrumbs();
            setTimeout(resizeCanvas, 50);
            return;
        }

        // Calculate target: zoom toward the node's title bar (top-left)
        const wrapper = document.getElementById('graph-canvas-wrapper');
        const ww = wrapper.clientWidth;
        const wh = wrapper.clientHeight;
        const nodeX = subNode.pos[0];
        const nodeY = subNode.pos[1] - LiteGraph.NODE_TITLE_HEIGHT;
        const zoomScale = Math.max(canvas.ds.scale * 3, 4);
        const targetOX = -nodeX + 20 / zoomScale;
        const targetOY = -nodeY + 20 / zoomScale;

        animateDS(canvas, zoomScale, targetOX, targetOY, ZOOM_DURATION, function() {
            _origOpen.call(canvas, g);
            // Reset view for the inner graph
            canvas.ds.scale = 1;
            canvas.ds.offset[0] = 0;
            canvas.ds.offset[1] = 0;
            canvas.setDirty(true, true);
            updateBreadcrumbs();
            setTimeout(resizeCanvas, 50);
        });
    };

    const _origClose = LGraphCanvas.prototype.closeSubgraph;
    LGraphCanvas.prototype.closeSubgraph = function() {
        const canvas = this;
        const currentGraph = canvas.graph;
        const subNode = currentGraph._subgraph_node;

        // Save where we'll land in the parent
        const parentGraph = (canvas._graph_stack && canvas._graph_stack.length > 0)
            ? canvas._graph_stack[canvas._graph_stack.length - 1] : null;

        _origClose.call(this);
        updateBreadcrumbs();
        setTimeout(resizeCanvas, 50);

        if (!subNode || !parentGraph) return;

        // Start zoomed into the node's title bar, then zoom out
        const nodeX = subNode.pos[0];
        const nodeY = subNode.pos[1] - LiteGraph.NODE_TITLE_HEIGHT;

        // Save the target (normal) view
        const endScale = canvas.ds.scale;
        const endOX = canvas.ds.offset[0];
        const endOY = canvas.ds.offset[1];

        // Start zoomed in at the title bar (top-left)
        const startScale = Math.max(endScale * 3, 4);
        canvas.ds.scale = startScale;
        canvas.ds.offset[0] = -nodeX + 20 / startScale;
        canvas.ds.offset[1] = -nodeY + 20 / startScale;
        canvas.setDirty(true, true);

        animateDS(canvas, endScale, endOX, endOY, ZOOM_DURATION, null);
    };

    function resizeCanvas() {
        const wrapper = document.getElementById('graph-canvas-wrapper');
        if (!wrapper) return;
        const dpr = window.devicePixelRatio || 1;
        canvasElement.width = wrapper.clientWidth * dpr;
        canvasElement.height = wrapper.clientHeight * dpr;
        canvasElement.style.width = wrapper.clientWidth + 'px';
        canvasElement.style.height = wrapper.clientHeight + 'px';
        if (graphCanvas) graphCanvas.resize();
    }

    setTimeout(resizeCanvas, 100);
    window.addEventListener('resize', () => {
        resizeCanvas();
        if (t3 && document.getElementById('3d-tab').classList.contains('active')) {
            const c = document.getElementById('canvas3d').parentElement;
            t3.renderer.setSize(c.clientWidth, c.clientHeight);
            t3.composer.setSize(c.clientWidth, c.clientHeight);
            t3.camera.aspect = c.clientWidth / c.clientHeight;
            t3.camera.updateProjectionMatrix();
        }
    });

    // ---- Utility ----

    function darkenColor(hex, factor) {
        const r = parseInt(hex.slice(1,3), 16);
        const g = parseInt(hex.slice(3,5), 16);
        const b = parseInt(hex.slice(5,7), 16);
        return '#' +
            Math.round(r * factor).toString(16).padStart(2,'0') +
            Math.round(g * factor).toString(16).padStart(2,'0') +
            Math.round(b * factor).toString(16).padStart(2,'0');
    }

    function sanitizeName(name) {
        return name.replace(/[^a-zA-Z0-9_]/g, '_').replace(/^[0-9]/, '_$&');
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // ---- Dynamic Atomic Node Registration ----

    function registerAtomic(atomic) {
        atomicRegistry[atomic.id] = atomic;
        const typeName = `atomic/${atomic.category}/${atomic.id}`;

        function AtomicNode() {
            const def = atomicRegistry[atomic.id];

            for (const inp of def.inputs) {
                this.addInput(inp.name, inp.type);
            }
            for (const out of def.outputs) {
                this.addOutput(out.name, out.type);
            }

            this.properties = {};
            if (def.properties) {
                for (const prop of def.properties) {
                    this.properties[prop.name] = prop.default;
                    if (prop.type === 'bool') {
                        this.addWidget("toggle", prop.name, prop.default, (v) => { this.properties[prop.name] = v; scheduleCompile(); });
                    } else if (prop.type === 'choice' && prop.options) {
                        this.addWidget("combo", prop.name, prop.default, (v) => { this.properties[prop.name] = v; scheduleCompile(); }, { values: prop.options });
                    } else if (prop.type === 'int' || prop.type === 'float') {
                        this.addWidget("number", prop.name, prop.default, (v) => { this.properties[prop.name] = v; scheduleCompile(); }, { precision: prop.type === 'int' ? 0 : 3 });
                    } else {
                        this.addWidget("text", prop.name, String(prop.default), (v) => { this.properties[prop.name] = v; scheduleCompile(); });
                    }
                }
            }

            this._atomicDef = def;

            if (def.color) {
                this.color = def.color;
                this.bgcolor = darkenColor(def.color, 0.35);
            }
        }

        AtomicNode.title = atomic.name;
        AtomicNode.desc = atomic.description || '';
        AtomicNode.prototype.onExecute = function() {};
        AtomicNode.prototype.onPropertyChanged = function() { scheduleCompile(); };

        LiteGraph.registerNodeType(typeName, AtomicNode);
        return typeName;
    }

    // ---- Load Atomics from JSON ----

    async function loadAtomics() {
        try {
            const indexResp = await fetch('atomics/index.json');
            const index = await indexResp.json();
            const paletteEl = document.getElementById('atomic-palette');
            paletteEl.innerHTML = '';

            for (const [catId, catDef] of Object.entries(index.categories)) {
                const catEl = document.createElement('div');
                catEl.className = 'palette-category';
                catEl.innerHTML = `
                    <div class="palette-category-header">
                        <span>${catDef.icon} ${catDef.label}</span>
                        <span class="palette-arrow">&#9654;</span>
                    </div>
                    <div class="palette-category-content"></div>
                `;
                paletteEl.appendChild(catEl);

                const headerEl = catEl.querySelector('.palette-category-header');
                const contentEl = catEl.querySelector('.palette-category-content');
                headerEl.addEventListener('click', () => catEl.classList.toggle('expanded'));

                for (const file of catDef.files) {
                    const resp = await fetch(`atomics/${file}`);
                    const atomics = await resp.json();

                    for (const atomic of atomics) {
                        const typeName = registerAtomic(atomic);

                        const nodeEl = document.createElement('div');
                        nodeEl.className = 'palette-node';
                        nodeEl.style.borderLeftColor = atomic.color || '#888';
                        nodeEl.innerHTML = `<div>${atomic.name}<span class="palette-node-tag">${atomic.category}</span></div>` +
                            (atomic.description ? `<div class="palette-node-desc">${atomic.description}</div>` : '');
                        nodeEl.addEventListener('click', () => addNodeToGraph(typeName));
                        contentEl.appendChild(nodeEl);
                    }
                }
            }

            updateStatus(`Loaded ${Object.keys(atomicRegistry).length} atomics`);
        } catch (err) {
            console.error('Failed to load atomics:', err);
            updateStatus('Error loading atomics: ' + err.message);
        }
    }

    // ---- Add Node to Graph ----

    // Subgraph default: lighter so title text is readable
    LiteGraph.Subgraph.title_color = "#4a6a8a";
    // Remove the + buttons drawn on subgraph nodes (drawn in onDrawBackground)
    LiteGraph.Subgraph.prototype.onDrawBackground = function() {};
    LiteGraph.Subgraph.prototype.onMouseDown = null;
    delete LiteGraph.Subgraph.prototype.onGetInputs;
    delete LiteGraph.Subgraph.prototype.onGetOutputs;

    function addNodeToGraph(typeName) {
        // If it's a molecular component with a graph definition,
        // create a native subgraph node instead so it gets the expand button
        if (typeName.startsWith('molecular/')) {
            const compId = typeName.replace('molecular/', '');
            const compDef = molecularRegistry[compId];
            if (compDef && compDef.graph) {
                addComponentAsSubgraph(compDef, compId);
                return;
            }
        }

        const node = LiteGraph.createNode(typeName);
        if (!node) { console.error('Failed to create node:', typeName); return; }

        const area = graphCanvas.visible_area;
        if (area) {
            node.pos = [
                area[0] + area[2] * 0.3 + (Math.random() - 0.5) * 150,
                area[1] + area[3] * 0.3 + (Math.random() - 0.5) * 150
            ];
        } else {
            node.pos = [300 + Math.random() * 200, 100 + Math.random() * 300];
        }

        activeGraph().add(node);
        scheduleCompile();
    }

    // Create a graph/subgraph node from a component definition and add it to targetGraph.
    // Returns the subgraph node. If targetGraph is null, uses activeGraph().
    function createSubgraphFromComponent(compDef, compId, targetGraph, pos) {
        const subNode = LiteGraph.createNode('graph/subgraph');
        if (!subNode) return null;
        subNode.title = compDef.name;
        const nodeColor = compDef._paletteColor || '#6bb5ff';
        subNode.color = nodeColor;
        subNode.bgcolor = darkenColor(nodeColor, 0.35);
        subNode.pos = pos || [300, 200];

        (targetGraph || activeGraph()).add(subNode);
        const innerGraph = subNode.subgraph;
        const graphDef = compDef.graph;
        const idRemap = {};

        // Create inner nodes — recursively create subgraphs for nested components
        for (const sn of graphDef.nodes) {
            const innerPos = [100 + (sn.pos?.[0] || 0), 100 + (sn.pos?.[1] || 0)];

            // Check if this inner node is a molecular component with its own graph
            let innerNodeType = sn.type;
            let innerCompId = null;
            if (innerNodeType.startsWith('molecular/')) {
                innerCompId = innerNodeType.replace('molecular/', '');
            }
            const innerCompDef = innerCompId ? molecularRegistry[innerCompId] : null;

            if (innerCompDef && innerCompDef.graph) {
                // Recursively create as subgraph
                const nested = createSubgraphFromComponent(innerCompDef, innerCompId, innerGraph, innerPos);
                if (nested) {
                    if (sn.title) nested.title = sn.title;
                    idRemap[sn.id] = nested.id;
                }
            } else {
                const newNode = LiteGraph.createNode(sn.type);
                if (!newNode) continue;
                newNode.pos = innerPos;
                if (sn.properties) {
                    for (const [k, v] of Object.entries(sn.properties)) {
                        newNode.properties[k] = v;
                        if (newNode.widgets) { const w = newNode.widgets.find(w => w.name === k); if (w) w.value = v; }
                    }
                }
                if (sn.title) newNode.title = sn.title;
                innerGraph.add(newNode);
                idRemap[sn.id] = newNode.id;
            }
        }

        // Inner links
        for (const sl of (graphDef.links || [])) {
            const f = innerGraph.getNodeById(idRemap[sl[1]]);
            const t = innerGraph.getNodeById(idRemap[sl[3]]);
            if (f && t) f.connect(sl[2], t, sl[4]);
        }

        // Add external ports directly to the subgraph node (no graph/input or graph/output nodes)
        const rawInputMap = graphDef.input_map || {};
        const rawOutputMap = graphDef.output_map || {};

        // Build port map: maps subgraph slot index → inner node targets
        const portMap = { inputs: {}, outputs: {} };
        let inputIdx = 0;
        for (const [name, targets] of Object.entries(rawInputMap)) {
            subNode.addInput(name, '');
            const arr = Array.isArray(targets) ? targets : [targets];
            portMap.inputs[inputIdx] = arr.map(t => ({ nodeId: idRemap[t.node_id], slot: t.slot }));
            inputIdx++;
        }
        let outputIdx = 0;
        for (const [name, source] of Object.entries(rawOutputMap)) {
            subNode.addOutput(name, '');
            const src = Array.isArray(source) ? source[0] : source;
            portMap.outputs[outputIdx] = { nodeId: idRemap[src.node_id], slot: src.slot };
            outputIdx++;
        }

        subNode._molecularDef = compDef;
        subNode._molecularMeta = { id: compId, name: compDef.name };
        subNode._portMap = portMap;

        return subNode;
    }

    function addComponentAsSubgraph(compDef, compId) {
        const area = graphCanvas.visible_area;
        let pos;
        if (area) {
            pos = [area[0] + area[2] * 0.3 + (Math.random() - 0.5) * 150,
                   area[1] + area[3] * 0.3 + (Math.random() - 0.5) * 150];
        } else {
            pos = [300 + Math.random() * 200, 100 + Math.random() * 300];
        }
        createSubgraphFromComponent(compDef, compId, null, pos);
        scheduleCompile();
    }

    // ---- Graph-to-Code Compiler (Handlebars) ----

    let compileTimer = null;

    function scheduleCompile() {
        clearTimeout(compileTimer);
        compileTimer = setTimeout(compileGraph, 150);
    }

    function compileGraph() {
        const nodes = graph._nodes;
        if (!nodes || nodes.length === 0) {
            setCode('# Build a graph in the Designer tab to generate code');
            updateNodeCount(0);
            return;
        }
        updateNodeCount(nodes.length);

        try {
            const code = compile(nodes, graph.links);
            setCode(code);
        } catch (err) {
            setCode(`# Compilation error: ${err.message}\n# ${err.stack}`);
        }
    }

    function compile(nodes, linksMap) {
        // 1. Topological sort
        const sorted = topologicalSort(nodes, linksMap);

        // 2. Assign variable names to each output port
        const varNames = {};  // "nodeId:slotIndex" -> variable name
        const usedNames = new Set();

        for (const node of sorted) {
            const def = node._atomicDef || node._molecularDef;
            if (!def) continue;

            for (let i = 0; i < def.outputs.length; i++) {
                const defId = def.id || def.name?.toLowerCase().replace(/\s+/g, '_') || 'node';
                const baseName = sanitizeName(`${defId}_${node.id}_${def.outputs[i].name}`);
                let name = baseName;
                let c = 2;
                while (usedNames.has(name)) { name = `${baseName}_${c++}`; }
                usedNames.add(name);
                varNames[`${node.id}:${i}`] = name;
            }
        }

        // 3. Resolve inputs via wires, substitute into code templates
        const codeLines = [];
        const allImports = new Set();

        for (const node of sorted) {
            const def = node._atomicDef || node._molecularDef;

            // Handle native subgraph nodes: recursively compile inner graph
            if (node.subgraph && !def) {
                const innerResult = compileSubgraph(node, varNames, linksMap);
                for (const imp of innerResult.imports) allImports.add(imp);
                codeLines.push(`# [${node.title || 'Subgraph'}] node:${node.id}`);
                codeLines.push(innerResult.code);
                codeLines.push('');
                continue;
            }

            if (!def) continue;

            if (def.imports) {
                for (const imp of def.imports) allImports.add(imp);
            }

            const subs = {};

            // Special: {{_id}} for unique temp variable scoping
            subs['_id'] = String(node.id);

            // Output variables
            for (let i = 0; i < def.outputs.length; i++) {
                subs[def.outputs[i].name] = varNames[`${node.id}:${i}`];
            }

            // Input variables (trace wires)
            for (let i = 0; i < def.inputs.length; i++) {
                const inputName = def.inputs[i].name;
                const linkId = (node.inputs[i] && node.inputs[i].link != null) ? node.inputs[i].link : null;

                if (linkId !== null && linksMap[linkId]) {
                    const link = linksMap[linkId];
                    const sourceVar = varNames[`${link.origin_id}:${link.origin_slot}`];
                    subs[inputName] = sourceVar || `None  # unresolved: ${inputName}`;
                } else {
                    subs[inputName] = `None  # disconnected: ${inputName}`;
                }
            }

            // Properties
            if (def.properties) {
                for (const prop of def.properties) {
                    let val = node.properties[prop.name];
                    if (val === undefined) val = prop.default;
                    subs[prop.name] = (prop.type === 'bool') ? (val ? 'True' : 'False') : String(val);
                }
            }

            // Handlebars substitution
            let code = def.code;
            for (const [key, value] of Object.entries(subs)) {
                code = code.replace(new RegExp(`\\{\\{${escapeRegex(key)}\\}\\}`, 'g'), value);
            }

            const label = node._molecularMeta ? node._molecularMeta.name : def.name;
            codeLines.push(`# [${label}] node:${node.id}`);
            codeLines.push(code);
            codeLines.push('');
        }

        // 4. Assemble
        let script = `# Generated by Rapid Neural Designer\n`;
        script += `# ${new Date().toISOString()}\n\n`;

        const sortedImports = Array.from(allImports).sort();
        if (sortedImports.length > 0) {
            script += sortedImports.join('\n') + '\n\n';
        }

        script += codeLines.join('\n');
        script += `\nprint("Model execution complete.")`;

        return script;
    }

    function compileSubgraph(subNode, parentVarNames, parentLinks) {
        // If the subgraph node has a _molecularDef with code, use that directly
        // (same as compiling any other molecular node, with handlebars substitution)
        const def = subNode._molecularDef;
        if (def && def.code) {
            const allImports = new Set();
            if (def.imports) def.imports.forEach(i => allImports.add(i));

            const subs = { '_id': String(subNode.id) };

            // Map outputs to parent variable names
            if (def.outputs) {
                for (let i = 0; i < def.outputs.length; i++) {
                    subs[def.outputs[i].name] = parentVarNames[`${subNode.id}:${i}`];
                }
            }

            // Map inputs by tracing wires from parent
            if (def.inputs) {
                for (let i = 0; i < def.inputs.length; i++) {
                    const inputName = def.inputs[i].name;
                    const linkId = (subNode.inputs[i] && subNode.inputs[i].link != null) ? subNode.inputs[i].link : null;
                    if (linkId !== null && parentLinks[linkId]) {
                        const link = parentLinks[linkId];
                        const srcVar = parentVarNames[`${link.origin_id}:${link.origin_slot}`];
                        subs[inputName] = srcVar || `None  # unresolved: ${inputName}`;
                    } else {
                        subs[inputName] = `None  # disconnected: ${inputName}`;
                    }
                }
            }

            // Properties
            if (def.properties) {
                for (const prop of def.properties) {
                    let val = subNode.properties[prop.name];
                    if (val === undefined) val = prop.default;
                    subs[prop.name] = (prop.type === 'bool') ? (val ? 'True' : 'False') : String(val);
                }
            }

            let code = def.code;
            for (const [key, value] of Object.entries(subs)) {
                code = code.replace(new RegExp(`\\{\\{${escapeRegex(key)}\\}\\}`, 'g'), value);
            }
            return { code, imports: Array.from(allImports) };
        }

        // Fallback: compile inner graph nodes directly
        const innerGraph = subNode.subgraph;
        const innerNodes = innerGraph._nodes || [];
        const innerLinks = innerGraph.links || {};
        const portMap = subNode._portMap || { inputs: {}, outputs: {} };

        // Map parent wires to inner node variables via portMap
        const inputVarByNodeSlot = {}; // "nodeId:slot" → parent variable name
        if (subNode.inputs) {
            for (let i = 0; i < subNode.inputs.length; i++) {
                const inp = subNode.inputs[i];
                const linkId = (inp && inp.link != null) ? inp.link : null;
                if (linkId !== null && parentLinks[linkId]) {
                    const link = parentLinks[linkId];
                    const srcVar = parentVarNames[`${link.origin_id}:${link.origin_slot}`];
                    if (srcVar && portMap.inputs[i]) {
                        for (const target of portMap.inputs[i]) {
                            inputVarByNodeSlot[`${target.nodeId}:${target.slot}`] = srcVar;
                        }
                    }
                }
            }
        }

        // Map output ports to parent variable names
        const outputVarByNodeSlot = {};
        if (subNode.outputs) {
            for (let i = 0; i < subNode.outputs.length; i++) {
                const parentVar = parentVarNames[`${subNode.id}:${i}`];
                if (parentVar && portMap.outputs[i]) {
                    const src = portMap.outputs[i];
                    outputVarByNodeSlot[`${src.nodeId}:${src.slot}`] = parentVar;
                }
            }
        }

        const sorted = topologicalSort(innerNodes, innerLinks);
        const varNames = {};
        const usedNames = new Set();

        for (const n of sorted) {
            const nd = n._atomicDef || n._molecularDef;
            const outputs = nd ? nd.outputs : (n.outputs || []);
            if (!outputs || !outputs.length) continue;
            for (let i = 0; i < outputs.length; i++) {
                // Check if this output should use the parent's variable name
                const overrideVar = outputVarByNodeSlot[`${n.id}:${i}`];
                if (overrideVar) {
                    varNames[`${n.id}:${i}`] = overrideVar;
                } else {
                    const defId = (nd && nd.id) || n.title?.toLowerCase().replace(/\s+/g, '_') || 'node';
                    const outName = outputs[i].name || `out_${i}`;
                    const base = sanitizeName(`${defId}_s${subNode.id}_${n.id}_${outName}`);
                    let vn = base; let c2 = 2;
                    while (usedNames.has(vn)) vn = `${base}_${c2++}`;
                    usedNames.add(vn);
                    varNames[`${n.id}:${i}`] = vn;
                }
            }
        }

        const codeLines = [];
        const allImports = new Set();

        for (const n of sorted) {
            if (n.subgraph) {
                const nestedResult = compileSubgraph(n, varNames, innerLinks);
                for (const imp of nestedResult.imports) allImports.add(imp);
                codeLines.push(`# [${n.title || 'Subgraph'}] nested`);
                codeLines.push(nestedResult.code);
                continue;
            }

            const nd = n._atomicDef || n._molecularDef;
            if (!nd) continue;
            if (nd.imports) nd.imports.forEach(i => allImports.add(i));

            const subs = { '_id': `s${subNode.id}_${n.id}` };

            for (let i = 0; i < nd.outputs.length; i++) {
                subs[nd.outputs[i].name] = varNames[`${n.id}:${i}`];
            }

            for (let i = 0; i < nd.inputs.length; i++) {
                const inputName = nd.inputs[i].name;
                // Check if this input is fed by a parent wire (via portMap)
                const parentVar = inputVarByNodeSlot[`${n.id}:${i}`];
                if (parentVar) {
                    subs[inputName] = parentVar;
                } else {
                    const linkId = (n.inputs[i] && n.inputs[i].link != null) ? n.inputs[i].link : null;
                    if (linkId !== null && innerLinks[linkId]) {
                        const link = innerLinks[linkId];
                        subs[inputName] = varNames[`${link.origin_id}:${link.origin_slot}`] || 'None';
                    } else {
                        subs[inputName] = 'None  # disconnected';
                    }
                }
            }

            if (nd.properties) {
                for (const prop of nd.properties) {
                    let val = n.properties[prop.name];
                    if (val === undefined) val = prop.default;
                    subs[prop.name] = (prop.type === 'bool') ? (val ? 'True' : 'False') : String(val);
                }
            }

            let code = nd.code;
            for (const [key, value] of Object.entries(subs)) {
                code = code.replace(new RegExp(`\\{\\{${escapeRegex(key)}\\}\\}`, 'g'), value);
            }
            codeLines.push(code);
        }

        return { code: codeLines.join('\n'), imports: Array.from(allImports) };
    }

    function escapeRegex(str) {
        return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function topologicalSort(nodes, linksMap) {
        const inDegree = {};
        const adjList = {};
        const nodeMap = {};

        for (const node of nodes) {
            nodeMap[node.id] = node;
            inDegree[node.id] = 0;
            adjList[node.id] = [];
        }

        if (linksMap) {
            for (const linkId in linksMap) {
                const link = linksMap[linkId];
                if (!link || !nodeMap[link.origin_id] || !nodeMap[link.target_id]) continue;
                inDegree[link.target_id]++;
                adjList[link.origin_id].push(link.target_id);
            }
        }

        // Kahn's algorithm
        const queue = [];
        for (const id in inDegree) {
            if (inDegree[id] === 0) queue.push(parseInt(id));
        }

        const sorted = [];
        while (queue.length > 0) {
            const id = queue.shift();
            if (nodeMap[id]) sorted.push(nodeMap[id]);
            for (const depId of adjList[id]) {
                inDegree[depId]--;
                if (inDegree[depId] === 0) queue.push(depId);
            }
        }

        // Append any remaining (cycle or disconnected)
        for (const node of nodes) {
            if (!sorted.includes(node)) sorted.push(node);
        }

        return sorted;
    }

    function saveGraph() {
        const data = JSON.stringify(activeGraph().serialize(), null, 2);

        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');

        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = e => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = event => {
                try {
                    activeGraph().configure(JSON.parse(event.target.result));
                    scheduleCompile();
                    updateStatus('Loaded: ' + file.name);
                } catch (err) {
                    alert('Error loading graph: ' + err.message);
                }
            };
            reader.readAsText(file);
        };
        input.click();

        if (confirm('Clear entire graph?')) {
            activeGraph().clear();
            scheduleCompile();
        }
    }

    function toggleCollapseAll() {
        const nodes = activeGraph()._nodes;
        if (!nodes || nodes.length === 0) return;
        // If any node is expanded, collapse all. Otherwise expand all.
        const anyExpanded = nodes.some(n => !n.flags.collapsed && n.type !== 'graph/input' && n.type !== 'graph/output');
        for (const n of nodes) {
            if (n.type === 'graph/input' || n.type === 'graph/output') continue;
            n.flags = n.flags || {};
            n.flags.collapsed = anyExpanded;
        }
        graphCanvas.setDirty(true, true);
        // Update button text
        const btn = event.target;
        btn.textContent = anyExpanded ? 'Expand All' : 'Collapse All';
    }

    // ---- Backend Execution ----

    // Backend URL: use subdomain for remote access, port 5000 for local
    const BACKEND_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
        ? 'http://localhost:5000'
        : `https://rndbackend.bake.systems`;

    async function runCode() {
        const code = monacoEditor ? monacoEditor.getValue() : '';
        const btn = document.getElementById('run-button');
        const outEl = document.getElementById('execution-output');
        const contentEl = document.getElementById('execution-content');

        if (!code.trim()) { alert('No code to run'); return; }

        btn.disabled = true;
        btn.classList.add('running');
        btn.textContent = 'Running...';
        outEl.classList.add('visible');
        contentEl.innerHTML = '<div class="exec-info">Executing...</div>';

        try {
            const resp = await fetch(`${BACKEND_URL}/execute`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code })
            });
            const result = await resp.json();
            let html = '';
            if (result.success) {
                html += `<div class="exec-info">Completed in ${result.execution_time}s</div>`;
                if (result.stdout) html += `<div class="exec-stdout">${escapeHtml(result.stdout)}</div>`;
                if (result.stderr) html += `<div class="exec-stderr">${escapeHtml(result.stderr)}</div>`;
            } else {
                html += `<div class="exec-error">Failed</div>`;
                if (result.error) html += `<div class="exec-error">${escapeHtml(result.error)}</div>`;
                if (result.stderr) html += `<div class="exec-stderr">${escapeHtml(result.stderr)}</div>`;
            }
            contentEl.innerHTML = html;
        } catch (err) {
            contentEl.innerHTML = `<div class="exec-error">Cannot connect to backend</div><div class="exec-info">Run: python backend.py</div>`;
        } finally {
            btn.disabled = false;
            btn.classList.remove('running');
            btn.textContent = 'Run Code';
        }
    }

        document.getElementById('execution-output').classList.remove('visible');

    // ---- Molecular Components ----

    async function loadMolecularComponents() {
        try {
            const resp = await fetch('components/index.json');
            if (!resp.ok) return;

            const index = await resp.json();
            const paletteEl = document.getElementById('molecular-palette');
            paletteEl.innerHTML = '';

            for (const comp of index.components) {
                const compResp = await fetch(`components/${comp.file}`);
                const compDef = await compResp.json();
                compDef._paletteColor = comp.color || '#6bb5ff';
                molecularRegistry[comp.id] = compDef;
                registerMolecular(comp, compDef);

                const nodeEl = document.createElement('div');
                nodeEl.className = 'palette-node';
                nodeEl.style.borderLeftColor = comp.color || '#6bb5ff';
                nodeEl.innerHTML = `<div>${comp.name}</div><div class="palette-node-desc">${comp.description || ''}</div>`;
                nodeEl.addEventListener('click', () => addNodeToGraph(`molecular/${comp.id}`));
                paletteEl.appendChild(nodeEl);

            updateStatus(`Loaded ${index.components.length} molecular components`);
        } catch (err) {
            console.log('No molecular components found (components/index.json missing)');
        }

    function registerMolecular(meta, compDef) {
        const typeName = `molecular/${meta.id}`;

        function MolecularNode() {
            if (compDef.inputs) {
                for (const inp of compDef.inputs) this.addInput(inp.name, inp.type);
            }
            if (compDef.outputs) {
                for (const out of compDef.outputs) this.addOutput(out.name, out.type);
            }
            this.properties = {};
            if (compDef.properties) {
                for (const prop of compDef.properties) {
                    this.properties[prop.name] = prop.default;
                    if (prop.type === 'bool') {
                        this.addWidget("toggle", prop.name, prop.default, (v) => { this.properties[prop.name] = v; scheduleCompile(); });
                    } else if (prop.type === 'choice' && prop.options) {
                        this.addWidget("combo", prop.name, prop.default, (v) => { this.properties[prop.name] = v; scheduleCompile(); }, { values: prop.options });
                    } else if (prop.type === 'int' || prop.type === 'float') {
                        this.addWidget("number", prop.name, prop.default, (v) => { this.properties[prop.name] = v; scheduleCompile(); }, { precision: prop.type === 'int' ? 0 : 3 });
                    } else {
                        this.addWidget("text", prop.name, String(prop.default), (v) => { this.properties[prop.name] = v; scheduleCompile(); });
                    }
                }
            }
            this._molecularDef = compDef;
            this._molecularMeta = meta;
            this.color = meta.color || '#6bb5ff';
            this.bgcolor = darkenColor(this.color, 0.35);
        }

        MolecularNode.title = meta.name;
        MolecularNode.desc = meta.description || '';
        MolecularNode.prototype.onExecute = function() {};
        MolecularNode.prototype.onPropertyChanged = function() { scheduleCompile(); };

        LiteGraph.registerNodeType(typeName, MolecularNode);
    }

    // ---- Merge graph data (add model without clearing) ----

    function mergeGraphData(data, label, color) {
        // Place subgraph node to the right of existing content
        let posX = 50, posY = 100;
        if (graph._nodes.length > 0) {
            let maxX = -Infinity;
            for (const n of graph._nodes) {
                const right = n.pos[0] + (n.size[0] || 200);
                if (right > maxX) maxX = right;
            }
            posX = maxX + 100;
        }

        // Create a subgraph node to contain the model
        const subNode = LiteGraph.createNode('graph/subgraph');
        if (!subNode) { updateStatus('Error: subgraph type not available'); return; }
        subNode.title = label || 'Model';
        subNode.pos = [posX, posY];
        if (color) {
            subNode.color = color;
            subNode.bgcolor = darkenColor(color, 0.35);
        }
        graph.add(subNode);

        const innerGraph = subNode.subgraph;

        // Find bounding box of source nodes
        let srcMinX = Infinity, srcMinY = Infinity;
        for (const nd of (data.nodes || [])) {
            if (nd.pos[0] < srcMinX) srcMinX = nd.pos[0];
            if (nd.pos[1] < srcMinY) srcMinY = nd.pos[1];
        }

        const idRemap = {};

        // Create all nodes inside the subgraph.
        // Molecular components with graph defs become nested subgraphs.
        for (const nd of (data.nodes || [])) {
            const innerPos = [100 + (nd.pos[0] - srcMinX), 100 + (nd.pos[1] - srcMinY)];

            // Check if this is a molecular component with a graph definition
            let compId = null;
            if (nd.type.startsWith('molecular/')) {
                compId = nd.type.replace('molecular/', '');
            }
            const compDef = compId ? molecularRegistry[compId] : null;

            if (compDef && compDef.graph) {
                // Create as a nested subgraph
                const nested = createSubgraphFromComponent(compDef, compId, innerGraph, innerPos);
                if (nested) {
                    if (nd.title) nested.title = nd.title;
                    idRemap[nd.id] = nested.id;
                }
            } else {
                const newNode = LiteGraph.createNode(nd.type);
                if (!newNode) { console.warn('Cannot create node type:', nd.type); continue; }
                newNode.pos = innerPos;
                if (nd.properties) {
                    for (const [k, v] of Object.entries(nd.properties)) {
                        newNode.properties[k] = v;
                        if (newNode.widgets) {
                            const w = newNode.widgets.find(w => w.name === k);
                            if (w) w.value = v;
                        }
                    }
                }
                if (nd.title) newNode.title = nd.title;
                innerGraph.add(newNode);
                idRemap[nd.id] = newNode.id;
            }
        }

        // Create internal links
        for (const lk of (data.links || [])) {
            const fromNode = innerGraph.getNodeById(idRemap[lk[1]]);
            const toNode = innerGraph.getNodeById(idRemap[lk[3]]);
            if (fromNode && toNode) {
                fromNode.connect(lk[2], toNode, lk[4]);
            }
        }

        // Collapse all inner nodes by default
        for (const n of innerGraph._nodes) {
            if (n.type !== 'graph/input' && n.type !== 'graph/output') {
                n.flags = n.flags || {};
                n.flags.collapsed = false;
            }
        }

        scheduleCompile();
        updateStatus(`Added model: ${label} (double-click to open, right-click to explode)`);
    }

    // ---- Model Library ----

    async function loadModels() {
        try {
            const resp = await fetch('models/index.json');
            if (!resp.ok) return;

            const index = await resp.json();
            const paletteEl = document.getElementById('model-palette');
            paletteEl.innerHTML = '';

            // Support grouped format (groups[]) or flat format (models[])
            const groups = index.groups || [{ name: null, models: index.models || [] }];

            for (const group of groups) {
                // Skip experimental groups if models folder doesn't exist
                if (group.experimental && group.models.length > 0) {
                    try {
                        const probe = await fetch(`models/${group.models[0].file}`, { method: 'HEAD' });
                        if (!probe.ok) continue; // experimental folder not present, skip
                    } catch { continue; }
                }

                if (group.name) {
                    // Render as collapsible subcategory
                    const catEl = document.createElement('div');
                    catEl.className = 'palette-category expanded';
                    catEl.innerHTML = `
                        <div class="palette-category-header">
                            <span>${group.name}</span>
                            <span class="palette-arrow">&#9654;</span>
                        </div>
                        <div class="palette-category-content"></div>
                    `;
                    paletteEl.appendChild(catEl);
                    catEl.querySelector('.palette-category-header').addEventListener('click', () => {
                        catEl.classList.toggle('expanded');
                    });
                    const contentEl = catEl.querySelector('.palette-category-content');
                    for (const model of group.models) {
                        contentEl.appendChild(createModelNode(model));

                } else {
                    for (const model of group.models) {

            console.log('No models found (models/index.json missing)');
        }

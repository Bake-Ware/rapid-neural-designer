    // Override node menu (right-click on a node)
    graphCanvas.getNodeMenuOptions = function(node) {
        const options = [];
        const selected = getSelectedNodes();

        // If multiple selected and this node is one of them, show group options
        if (selected.length > 1 && node.is_selected) {
            options.push({ content: `Condense (${selected.length} nodes)`, callback: () => createMolecularFromSelection(selected) });
            options.push(null);
        }

        options.push({ content: 'Clone', callback: () => {
            const clone = LiteGraph.createNode(node.type);
            if (clone) {
                clone.pos = [node.pos[0] + 30, node.pos[1] + 30];
                if (node.properties) {
                    for (const [k, v] of Object.entries(node.properties)) clone.properties[k] = v;
                }
                activeGraph().add(clone);
                scheduleCompile();
            }
        }});

        // Expand/Explode for subgraph or molecular nodes
        if (node.subgraph) {
            options.push({ content: 'Expand', callback: () => graphCanvas.openSubgraph(node.subgraph) });
            options.push({ content: 'Explode', callback: () => explodeMolecular(node) });
            options.push({ content: 'Save to File', callback: () => saveMolecularToFile(node) });
        } else if (node._molecularDef && node._molecularDef.graph) {
            // Convert legacy molecular to subgraph on first expand/explode
            options.push({ content: 'Expand', callback: () => convertToSubgraphAndExpand(node) });
            options.push({ content: 'Explode', callback: () => explodeMolecular(node) });
            options.push({ content: 'Save to File', callback: () => saveMolecularToFile(node) });
        }

        options.push(null);

        options.push({ content: 'Rename', callback: () => {
            const name = prompt('Node title:', node.title || '');
            if (name !== null) { node.title = name; graphCanvas.setDirty(true, true); }
        }});

        options.push({ content: 'Delete', callback: () => {
            activeGraph().remove(node);
            scheduleCompile();
        }});

        return options;
    };

    // Disable default LiteGraph search box (it shows built-in types)
    graphCanvas.allow_searchbox = false;

    // ---- Condense: Create Subgraph from Selection ----
    // Uses LiteGraph's native graph/subgraph node with graph/input and
    // graph/output nodes inside to define the interface.

    function createMolecularFromSelection(selectedNodes) {
        const name = prompt('Component name:');
        if (!name || !name.trim()) return;

        const cleanName = name.trim();
        const selectedIds = new Set(selectedNodes.map(n => n.id));

        // Find center of selection for placing the subgraph node
        let cx = 0, cy = 0;
        for (const n of selectedNodes) { cx += n.pos[0]; cy += n.pos[1]; }
        cx /= selectedNodes.length;
        cy /= selectedNodes.length;

        // Analyze boundary wires
        const incomingWires = []; // wires from outside → selected node
        const outgoingWires = []; // wires from selected node → outside
        const inputNameCount = {};
        const outputNameCount = {};

        for (const n of selectedNodes) {
            if (n.inputs) {
                for (let i = 0; i < n.inputs.length; i++) {
                    const inp = n.inputs[i];
                    if (inp.link == null) continue;
                    const link = activeGraph().links[inp.link];
                    if (!link) continue;
                    if (!selectedIds.has(link.origin_id)) {
                        let inputName = inp.name || 'input';
                        inputNameCount[inputName] = (inputNameCount[inputName] || 0) + 1;
                        if (inputNameCount[inputName] > 1) inputName += '_' + inputNameCount[inputName];
                        incomingWires.push({
                            name: inputName, type: inp.type || 'tensor',
                            srcNodeId: link.origin_id, srcSlot: link.origin_slot,
                            dstNodeId: n.id, dstSlot: i
                        });
                    }
                }
            }
            if (n.outputs) {
                for (let i = 0; i < n.outputs.length; i++) {
                    const out = n.outputs[i];
                    if (!out.links || out.links.length === 0) continue;
                    for (const linkId of out.links) {
                        const link = activeGraph().links[linkId];
                        if (link && !selectedIds.has(link.target_id)) {
                            let outputName = out.name || 'output';
                            outputNameCount[outputName] = (outputNameCount[outputName] || 0) + 1;
                            if (outputNameCount[outputName] > 1) outputName += '_' + outputNameCount[outputName];
                            outgoingWires.push({
                                name: outputName, type: out.type || 'tensor',
                                srcNodeId: n.id, srcSlot: i,
                                dstNodeId: link.target_id, dstSlot: link.target_slot
                            });
                        }
                    }
                }
            }
        }

        // Create the subgraph node
        const subNode = LiteGraph.createNode('graph/subgraph');
        if (!subNode) { updateStatus('Error: subgraph type not available'); return; }
        subNode.title = cleanName;
        subNode.pos = [cx - 70, cy - 30];
        activeGraph().add(subNode);

        const innerGraph = subNode.subgraph;

        // Move selected nodes into the inner graph
        const idRemap = {}; // old id → new inner node id
        const nodeMinX = Math.min(...selectedNodes.map(n => n.pos[0]));
        const nodeMinY = Math.min(...selectedNodes.map(n => n.pos[1]));

        for (const n of selectedNodes) {
            // Serialize and recreate in inner graph
            const innerNode = LiteGraph.createNode(n.type);
            if (!innerNode) continue;
            innerNode.pos = [200 + n.pos[0] - nodeMinX, 80 + n.pos[1] - nodeMinY];
            if (n.properties) {
                for (const [k, v] of Object.entries(n.properties)) {
                    innerNode.properties[k] = v;
                    if (innerNode.widgets) {
                        const w = innerNode.widgets.find(w => w.name === k);
                        if (w) w.value = v;
                    }
                }
            }
            if (n.title) innerNode.title = n.title;
            innerGraph.add(innerNode);
            idRemap[n.id] = innerNode.id;
        }

        // Recreate internal links in the inner graph
        for (const n of selectedNodes) {
            if (!n.inputs) continue;
            for (let i = 0; i < n.inputs.length; i++) {
                const inp = n.inputs[i];
                if (inp.link == null) continue;
                const link = activeGraph().links[inp.link];
                if (!link || !selectedIds.has(link.origin_id)) continue;

                const fromNode = innerGraph.getNodeById(idRemap[link.origin_id]);
                const toNode = innerGraph.getNodeById(idRemap[n.id]);
                if (fromNode && toNode) {
                    fromNode.connect(link.origin_slot, toNode, i);
                }
            }
        }

        // Add ports directly to the subgraph node and build portMap
        const portMap = { inputs: {}, outputs: {} };
        const inputSlotMap = {};
        for (const wire of incomingWires) {
            if (!(wire.name in inputSlotMap)) {
                const idx = Object.keys(inputSlotMap).length;
                subNode.addInput(wire.name, '');
                inputSlotMap[wire.name] = idx;
                portMap.inputs[idx] = [];
            }
            portMap.inputs[inputSlotMap[wire.name]].push({ nodeId: idRemap[wire.dstNodeId], slot: wire.dstSlot });
        }

        const outputSlotMap = {};
        for (const wire of outgoingWires) {
            if (!(wire.name in outputSlotMap)) {
                const idx = Object.keys(outputSlotMap).length;
                subNode.addOutput(wire.name, '');
                outputSlotMap[wire.name] = idx;
            }
            portMap.outputs[outputSlotMap[wire.name]] = { nodeId: idRemap[wire.srcNodeId], slot: wire.srcSlot };
        }

        subNode._portMap = portMap;

        // Reconnect external wires to the subgraph node
        for (const wire of incomingWires) {
            const srcNode = activeGraph().getNodeById(wire.srcNodeId);
            const slotIdx = inputSlotMap[wire.name];
            if (srcNode && slotIdx !== undefined) {
                srcNode.connect(wire.srcSlot, subNode, slotIdx);
            }
        }

        for (const wire of outgoingWires) {
            const dstNode = activeGraph().getNodeById(wire.dstNodeId);
            const slotIdx = outputSlotMap[wire.name];
            if (dstNode && slotIdx !== undefined) {
                subNode.connect(slotIdx, dstNode, wire.dstSlot);
            }
        }

        // Remove original selected nodes from parent graph
        for (const n of selectedNodes) {
            activeGraph().remove(n);
        }

        scheduleCompile();
        updateStatus(`Condensed ${selectedNodes.length} nodes → "${cleanName}" (double-click to open)`);
    }

    // ---- Save Subgraph to File ----

    // Convert a legacy molecular node to a native subgraph, replace it, and expand
    function convertToSubgraphAndExpand(node) {
        const def = node._molecularDef;
        if (!def || !def.graph) return;

        const currentGraph = activeGraph();
        const graphDef = def.graph;

        // Create subgraph node
        const subNode = LiteGraph.createNode('graph/subgraph');
        if (!subNode) return;
        subNode.title = node.title || def.name;
        subNode.pos = [...node.pos];
        currentGraph.add(subNode);

        const innerGraph = subNode.subgraph;
        const idRemap = {};

        // Create inner nodes from the molecular's graph definition
        for (const sn of graphDef.nodes) {
            const newNode = LiteGraph.createNode(sn.type);
            if (!newNode) continue;
            newNode.pos = [100 + (sn.pos?.[0] || 0), 100 + (sn.pos?.[1] || 0)];
            if (sn.properties) {
                for (const [k, v] of Object.entries(sn.properties)) {
                    newNode.properties[k] = v;
                    if (newNode.widgets) {
                        const w = newNode.widgets.find(w => w.name === k);
                        if (w) w.value = v;
                    }
                }
            }
            if (sn.title) newNode.title = sn.title;
            innerGraph.add(newNode);
            idRemap[sn.id] = newNode.id;
        }

        // Create inner links
        for (const sl of (graphDef.links || [])) {
            const f = innerGraph.getNodeById(idRemap[sl[1]]);
            const t = innerGraph.getNodeById(idRemap[sl[3]]);
            if (f && t) f.connect(sl[2], t, sl[4]);
        }

        // Add ports directly to subgraph node and build portMap
        const rawInputMap = graphDef.input_map || {};
        const rawOutputMap = graphDef.output_map || {};
        const portMap = { inputs: {}, outputs: {} };
        const inputSlotMap = {};

        let inputIdx = 0;
        for (const [name, targets] of Object.entries(rawInputMap)) {
            subNode.addInput(name, '');
            const arr = Array.isArray(targets) ? targets : [targets];
            portMap.inputs[inputIdx] = arr.map(t => ({ nodeId: idRemap[t.node_id], slot: t.slot }));
            inputSlotMap[name] = inputIdx;
            inputIdx++;
        }

        const outputSlotMap = {};
        let outputIdx = 0;
        for (const [name, source] of Object.entries(rawOutputMap)) {
            subNode.addOutput(name, '');
            const src = Array.isArray(source) ? source[0] : source;
            portMap.outputs[outputIdx] = { nodeId: idRemap[src.node_id], slot: src.slot };
            outputSlotMap[name] = outputIdx;
            outputIdx++;
        }

        subNode._portMap = portMap;

        // Reconnect external wires
        if (node.inputs) {
            for (let i = 0; i < node.inputs.length; i++) {
                const inp = node.inputs[i];
                if (inp.link == null) continue;
                const link = currentGraph.links[inp.link];
                if (!link) continue;
                const srcNode = currentGraph.getNodeById(link.origin_id);
                const slotIdx = inputSlotMap[inp.name];
                if (srcNode && slotIdx !== undefined) {
                    srcNode.connect(link.origin_slot, subNode, slotIdx);
                }
            }
        }
        if (node.outputs) {
            for (let i = 0; i < node.outputs.length; i++) {
                const out = node.outputs[i];
                if (!out.links || !out.links.length) continue;
                const slotIdx = outputSlotMap[out.name];
                if (slotIdx === undefined) continue;
                for (const linkId of [...out.links]) {
                    const link = currentGraph.links[linkId];
                    if (!link) continue;
                    const dstNode = currentGraph.getNodeById(link.target_id);
                    if (dstNode) subNode.connect(slotIdx, dstNode, link.target_slot);
                }
            }
        }

        // Remove original molecular node
        currentGraph.remove(node);

        // Open the new subgraph
        graphCanvas.openSubgraph(subNode.subgraph);
        scheduleCompile();
        updateStatus(`Converted "${subNode.title}" to subgraph`);
    }

    function saveMolecularToFile(node) {
        const data = node.serialize ? node.serialize() : {};
        const json = JSON.stringify(data, null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${(node.title || 'component').toLowerCase().replace(/\s+/g, '_')}.json`;
        a.click();
        URL.revokeObjectURL(url);
        updateStatus(`Saved "${node.title || 'component'}" to file`);
    }

    // ---- Graph Change Listeners ----
    graph.onNodeAdded = () => scheduleCompile();
    graph.onNodeRemoved = () => scheduleCompile();
    graph.onConnectionChange = () => scheduleCompile();

    // ---- Initialize ----
    async function init() {
        try {
            await loadAtomics();
        } catch(e) { console.error('Failed to load atomics:', e); }
        try {
            await loadMolecularComponents();
        } catch(e) { console.error('Failed to load components:', e); }
        try {
            await loadModels();
        } catch(e) { console.error('Failed to load models:', e); }
        graph.start();
        compileGraph();
        updateStatus('Ready');
    }

    init();
    </script>
</body>

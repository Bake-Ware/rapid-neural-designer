<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RND — API Token</title>
<style>
  :root { color-scheme: dark; }
  body { font-family: system-ui, sans-serif; background:#1a1a1e; color:#e6e6e6;
         display:flex; min-height:100vh; align-items:center; justify-content:center; margin:0; }
  .card { background:#26262c; border:1px solid #36363e; border-radius:12px; padding:28px;
          width:min(560px, 92vw); box-shadow:0 8px 30px rgba(0,0,0,.4); }
  h1 { font-size:18px; margin:0 0 4px; }
  p.sub { color:#9a9aa6; margin:0 0 20px; font-size:13px; }
  label { display:block; font-size:12px; color:#9a9aa6; margin:12px 0 4px; }
  input { width:100%; box-sizing:border-box; padding:10px 12px; border-radius:8px;
          border:1px solid #3a3a44; background:#1e1e24; color:#e6e6e6; font-size:14px; }
  button { margin-top:18px; width:100%; padding:11px; border:0; border-radius:8px;
           background:#4f7cff; color:#fff; font-size:14px; font-weight:600; cursor:pointer; }
  button:hover { background:#3f6cef; }
  .err { color:#ff6b6b; font-size:13px; margin-top:12px; min-height:16px; }
  .token-box { margin-top:18px; display:none; }
  code, pre { background:#15151a; border:1px solid #2c2c34; border-radius:8px; display:block;
              padding:12px; font-size:12px; word-break:break-all; white-space:pre-wrap; color:#cde3ff; }
  pre { margin-top:10px; color:#bdbdc8; }
  .copy { margin-top:8px; background:#2c2c34; }
  .copy:hover { background:#36363e; }
</style>
</head>
<body>
  <div class="card">
    <h1>API Token</h1>
    <p class="sub">Log in to get your machine token. Use it as <code style="display:inline;padding:2px 6px;">Authorization: Bearer &lt;token&gt;</code> for the API and MCP. It rotates if you change your password — treat it like a password.</p>

    <div id="login">
      <label>Username</label>
      <input id="u" autocomplete="username" autofocus>
      <label>Password</label>
      <input id="p" type="password" autocomplete="current-password">
      <button id="go">Log in &amp; get token</button>
      <div class="err" id="err"></div>
    </div>

    <div class="token-box" id="tokenBox">
      <label>Your API token</label>
      <code id="token"></code>
      <button class="copy" id="copy">Copy</button>
      <pre id="example"></pre>
    </div>
  </div>

<script>
const $ = id => document.getElementById(id);
async function run() {
  $('err').textContent = '';
  const username = $('u').value.trim(), password = $('p').value;
  if (!username || !password) { $('err').textContent = 'Enter username and password.'; return; }
  try {
    const lr = await fetch('/api/auth/login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username, password})
    });
    if (!lr.ok) { $('err').textContent = (await lr.json()).error || 'Login failed.'; return; }
    const session = (await lr.json()).token;
    const tr = await fetch('/api/auth/token', { headers:{ 'Authorization':'Bearer '+session } });
    if (!tr.ok) { $('err').textContent = 'Could not fetch token.'; return; }
    const tok = (await tr.json()).api_token;
    $('login').style.display = 'none';
    $('tokenBox').style.display = 'block';
    $('token').textContent = tok;
    $('example').textContent =
      'curl ' + location.origin + '/mcp \\\n'
      + '  -H "Authorization: Bearer ' + tok + '" \\\n'
      + '  -H "Content-Type: application/json" \\\n'
      + '  -d \'{"jsonrpc":"2.0","id":1,"method":"tools/list"}\'';
  } catch (e) { $('err').textContent = 'Network error: ' + e; }
}
$('go').addEventListener('click', run);
$('p').addEventListener('keydown', e => { if (e.key === 'Enter') run(); });
$('copy').addEventListener('click', () => navigator.clipboard.writeText($('token').textContent));
</script>
</body>
</html>
